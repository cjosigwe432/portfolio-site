<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Developer For Hire</title>

<link rel="stylesheet" href="style.css">

<!-- AOS ANIMATION -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<header class="hero">
    <img src="me.jpg" class="profile-img">

    <h1 data-aos="fade-up">I Build Websites That Bring Clients</h1>
    <p data-aos="fade-up" data-aos-delay="200">Freelance Web Developer</p>

    <a href="#contact" class="btn">Hire Me</a>

    <a class="btn whatsapp"
       href="https://wa.me/2349168144059?text=Hi%20I%20need%20a%20website"
       target="_blank">
       WhatsApp Me
    </a>
</header>

<!-- SERVICES -->
<section class="section" data-aos="fade-up">
    <h2>Services</h2>

    <div class="grid">
        <div class="card">
            <h3>Basic</h3>
            <p>₦10,000</p>
        </div>

        <div class="card">
            <h3>Business</h3>
            <p>₦25,000</p>
        </div>

        <div class="card">
            <h3>Full System</h3>
            <p>₦50,000+</p>
        </div>
    </div>
</section>

<!-- ABOUT -->
<section class="section" data-aos="fade-up">
    <h2>About Me</h2>
    <p>I help businesses grow online with modern websites and systems.</p>
</section>

<!-- CONTACT -->
<section id="contact" class="section" data-aos="fade-up">
    <h2>Hire Me</h2>

    <form id="contactForm" class="form">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" placeholder="Project Details" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script src="script.js"></script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>

</body>
</html>
