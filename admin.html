<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;">Client Dashboard</h1>

<div class="grid" id="messages"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDLvK-Q4v1hZ2B-mtxZzNXs5m1tCS6LdGw",
databaseURL: "https://neobank-app-3ebbe-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

firebase.database().ref("clients").on("value", snap=>{
let box=document.getElementById("messages");
box.innerHTML="";

snap.forEach(data=>{
let d=data.val();
box.innerHTML+=`
<div class="card">
<h3>${d.name}</h3>
<p>${d.email}</p>
<p>${d.message}</p>
<small>${d.time}</small>
</div>`;
});
});
</script>

</body>
</html>
